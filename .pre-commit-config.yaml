# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
# Minimal configuration focusing on basic checks that work in all environments
repos:
  - repo: local
    hooks:
      # Basic cabal validation that works with system cabal
      - id: cabal check
        name: cabal check
        entry: cabal check
        language: system
        files: '\.cabal$'
        pass_filenames: false

      # Basic YAML validation
      - id: check-yaml
        name: check-yaml
        entry: python3 -c "import yaml, sys; [yaml.safe_load(open(f)) for f in sys.argv[1:]]"
        language: system
        files: '\.ya?ml$'

      # Trailing whitespace check
      - id: trailing-whitespace
        name: trailing-whitespace
        entry: python3 -c "import sys, re; [sys.exit(1) for f in sys.argv[1:] if re.search(r'[ \t]+$', open(f).read(), re.MULTILINE)]"
        language: system
        types: [text]

      # End of file fixer
      - id: end-of-file-fixer
        name: end-of-file-fixer
        entry: python3 -c "import sys; [open(f, 'a').write('\n') if not open(f, 'rb').read().endswith(b'\n') else None for f in sys.argv[1:]]"
        language: system
        types: [text]

      # Temporarily disabled due to network/build issues in environment
      # These hooks require external dependencies that can't be installed reliably
      # - hlint, ormolu, haskell-ci, cabal-fmt hooks
      # Can be re-enabled in environments with better network connectivity
